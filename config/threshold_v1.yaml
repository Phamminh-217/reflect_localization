bag:
  path: "data/bags/lan4_u_.bag"
  topic: "/livox/lidar"
  message_type: "auto"

preprocessing:
  remove_nan: true

  range_filter:
    enabled: true
    min_range: 0.20
    max_range: 8.00

  height_filter:
    enabled: true
    min_z: 0.05
    max_z: 0.30

threshold:
  mode: "fixed"
  fixed_intensity: 140.0

clustering:
  method: "dbscan"
  use_dimension: "xy"
  eps: 0.08
  min_samples: 3

cluster_validation:
  min_points: 3
  max_points: 200
  max_extent_x: 0.30
  max_extent_y: 0.30
  max_extent_z: 0.50
  min_mean_intensity: 120.0

center_estimation:
  method: "intensity_weighted"
  intensity_weight_power: 1.0
  clamp_percentile: 95.0

output:
  output_dir: "data/results/sample_run"
  save_json: true
  save_csv: true
  save_debug_image: true

debug:
  enabled: true
  print_every_n_frames: 1
